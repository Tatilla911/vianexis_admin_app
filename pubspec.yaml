name: vianexis_admin_app
description: ViaNexis platform admin mobile and tablet app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.1
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.1.1
  url_launcher: ^6.3.2
  package_info_plus: ^10.1.0
  file_picker: ^3.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: assets/icons/app_icon.png

flutter_native_splash:
  color: "#0D1B2A"
  image: assets/branding/vianexis_mark.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/vianexis_logo.png
    - assets/branding/vianexis_mark.png
    - assets/branding/vianexis_watermark.png
    - assets/backgrounds/admin_background.png
    - assets/icons/app_icon.png
